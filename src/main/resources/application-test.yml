spring:
  # H2 Database Configuration for Testing
  datasource:
    url: jdbc:h2:mem:ecommerce_test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

  h2:
    console:
      enabled: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  # Disable mail sending in tests (use mock)
  mail:
    host: localhost
    port: 1026

logging:
  level:
    platform.ecommerce: INFO
    org.hibernate.SQL: INFO
